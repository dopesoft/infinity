# MCP server registry. Set MCP_CONFIG to a different path to override.
# Each entry connects on Core startup; tools register under namespace
# "<server>__<tool>" (e.g. "filesystem__read_file"). Anthropic tool-name
# regex disallows dots, so a double underscore is the namespace separator.

servers:
  # Disabled: this entry tried to spawn `npx -y @modelcontextprotocol/server-filesystem`
  # over stdio, but the production Core image is distroless (no Node, no npx) so it
  # could never connect on Railway. Even if it did, it would only see the container's
  # filesystem — not the boss's Mac. The claude_code bridge below covers the same
  # surface (Read / Write / Edit / LS / Glob / Grep) over the Cloudflare tunnel.
  # - name: filesystem
  #   transport: stdio
  #   enabled: true
  #   command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

  # Claude Code via the home-Mac coder bridge.
  #
  # Brings Bash, Read, Write, Edit, LS, Grep, Glob into Infinity using the
  # boss's Max subscription (no API key billed). The Mac runs `claude mcp serve`
  # under launchd, mcp-proxy bridges stdio→SSE, Cloudflare Tunnel exposes the
  # SSE endpoint at coder.dopesoft.io and Cloudflare Access enforces a Service
  # Token (CF-Access-Client-Id + CF-Access-Client-Secret) at the edge.
  #
  # Disabled by default. After running docs/claude-code/install.sh and
  # configuring Cloudflare Access (see docs/claude-code/SETUP.md), set:
  #   CLAUDE_CODE_TUNNEL_URL=https://coder.dopesoft.io/sse
  #   CF_ACCESS_CLIENT_ID=<service token client id>.access
  #   CF_ACCESS_CLIENT_SECRET=<service token secret>
  # then flip enabled to true.
  - name: claude_code
    transport: sse
    enabled: true
    url_env: CLAUDE_CODE_TUNNEL_URL
    auth: cloudflare_access
    cf_client_id_env: CF_ACCESS_CLIENT_ID
    cf_client_secret_env: CF_ACCESS_CLIENT_SECRET

  # GitHub remote MCP (official, github/github-mcp-server hosted by GitHub).
  #
  # Gives Infinity the GitHub API surface: list repos, read PRs/issues/files,
  # search code, open PRs/issues, post comments. Commits/pushes still happen
  # locally on the home Mac via claude_code__Bash (uses your gh auth + ssh
  # keys) — this MCP is for everything that touches github.com itself.
  #
  # TRANSPORT: GitHub's endpoint speaks the 2025-03-26 "Streamable HTTP"
  # transport, NOT the older two-URL SSE transport. The standalone SSE
  # side-channel (GET for server-initiated notifications) returns 405
  # Method Not Allowed on their host, so we disable it — POST-only
  # request/response is enough for tool listing + execution.
  #
  # Setup:
  #   1. Create a fine-grained PAT at github.com/settings/personal-access-tokens
  #      scoped to the repos Infinity should touch (Contents R/W, Pull
  #      requests R/W, Issues R/W, Metadata R).
  #   2. railway variables --service core --set GITHUB_MCP_TOKEN=<pat>
  #   3. Rebuild + redeploy core (mcp.yaml is embedded into the binary).
  #
  # If GITHUB_MCP_TOKEN is unset on boot, connect fails loudly and the
  # rest of Infinity comes up fine — github__* tools just won't be in the
  # registry. Identical fallback shape to claude_code on a missing tunnel URL.
  - name: github
    transport: http
    enabled: true
    url: https://api.githubcopilot.com/mcp/
    auth: bearer
    auth_token_env: GITHUB_MCP_TOKEN
    disable_standalone_sse: true

  # Composio — unified MCP gateway to ~250 SaaS integrations (Gmail, Slack,
  # Notion, Linear, HubSpot, Stripe, …). Composio runs the per-vendor OAuth
  # apps and token vault on their side; Infinity just consumes the unified
  # MCP. Tools register as composio__<TOOLKIT>_<VERB>, e.g.
  # composio__GITHUB_CREATE_ISSUE, composio__GMAIL_SEND_EMAIL.
  #
  # AUTH NOTE: Composio's MCP gateway authenticates with the consumer key
  # via `x-consumer-api-key: <raw>` — NOT `Authorization: Bearer`. The
  # workspace admin API key (used for the catalog REST proxy in
  # connectors_api.go) is a separate credential and goes in
  # COMPOSIO_ADMIN_API_KEY when you want the /connectors browse tab to work.
  #
  # Why Composio instead of registering every OAuth app ourselves:
  #   - Skips 6+ months of vendor-by-vendor OAuth app registration
  #   - Google's app-verification fee ($15-75k for restricted scopes) is theirs, not ours
  #   - Their catalog grows — we get new integrations for free
  #   - Multi-tenant story is shipped: pass per-user entity_id and they handle the rest
  #
  # Setup:
  #   railway variables --service core --set COMPOSIO_API_KEY=ck_...   (consumer key, for MCP)
  #   railway variables --service core --set COMPOSIO_ADMIN_API_KEY=... (workspace key, for catalog REST)
  - name: composio
    transport: http
    enabled: true
    url: https://connect.composio.dev/mcp
    auth: header
    auth_header_name: x-consumer-api-key
    auth_token_env: COMPOSIO_API_KEY
    disable_standalone_sse: true

  # Tavily MCP (uncomment + set TAVILY_API_KEY)
  # - name: tavily
  #   transport: sse
  #   enabled: true
  #   url: https://mcp.tavily.com/sse
