<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon. Safe zone is the inner ~80% of the canvas; the
       glyph sits within it so any platform-specific mask (circle, squircle,
       rounded square) crops cleanly. White background + black glyph. -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  <g
    transform="translate(112 112) scale(12)"
    fill="none"
    stroke="#000000"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M6 16c5 0 7-8 12-8a4 4 0 0 1 0 8c-5 0-7-8-12-8a4 4 0 1 0 0 8"/>
  </g>
</svg>
