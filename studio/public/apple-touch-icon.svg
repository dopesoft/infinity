<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- iOS home-screen icon when the PWA is installed via Safari → Add to
       Home Screen. iOS clips this with its own rounded-square mask, so we
       fill the canvas flat. Same lucide Infinity glyph as the in-app
       brand so the home-screen tile matches the favicon and the header. -->
  <rect width="180" height="180" fill="#000000"/>
  <g
    transform="translate(30 30) scale(5)"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M6 16c5 0 7-8 12-8a4 4 0 0 1 0 8c-5 0-7-8-12-8a4 4 0 1 0 0 8"/>
  </g>
</svg>
