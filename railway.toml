# Railway monorepo config for Infinity.
# In the Railway dashboard, set each service's root directory to match — that
# way Railway's auto-detection finds the per-service Dockerfile cleanly.
#
#   core service    → root directory = core/
#   studio service  → root directory = studio/
#   gepa service    → root directory = docker/gepa/   (Phase-6 skill optimizer)
#   plasticity      → root directory = docker/plasticity/ (Gym worker)
#   workspace       → root directory = docker/workspace/ (cloud bridge — files + bash + git)
#   embed sidecar   → root directory = .              (uses docker/embed.Dockerfile)
#
# Postgres: use Supabase or Neon for the database — both have pgvector
# enabled. Set DATABASE_URL on the core service to the pooler URL with
# sslmode=require. Honcho uses a separate schema on the same DB.

[build]
builder = "DOCKERFILE"

[[services]]
name = "core"

[services.source]
rootDirectory = "core"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "infinity serve"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "studio"

[services.source]
rootDirectory = "studio"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "gepa"

[services.source]
rootDirectory = "docker/gepa"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "plasticity"

[services.source]
rootDirectory = "docker/plasticity"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

# workspace — Jarvis's cloud filesystem bridge. Same five-primitive
# protocol as the Mac bridge (fs/save, fs/edit, bash, git/*). No LLM
# inside — Core does cognition via ChatGPT subscription OAuth. Volume
# mounted at /workspace persists across deploys and App Sleeping.
#
# Required env vars (set in Railway dashboard):
#   WORKSPACE_BRIDGE_TOKEN  shared bearer Core attaches to every call
#   GITHUB_TOKEN            PAT scoped to repo:write so `git push` works
#   GIT_USER_NAME           default "Jarvis Cloud"
#   GIT_USER_EMAIL          default "jarvis@dopesoft.io"
#
# Enable App Sleeping in the Railway service settings so it scales to
# zero when idle; Studio pre-warms via /health on Canvas mount.
[[services]]
name = "workspace"

[services.source]
rootDirectory = "docker/workspace"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
